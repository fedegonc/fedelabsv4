<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Selector de Fuentes')"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem;">
            <div>
                <h1>Selector de Fuentes</h1>
                <p>Elegí tu tipografía y escribí tu texto</p>
            </div>
            <a href="/fonts" class="btn btn-secondary">Gestionar Fuentes</a>
        </div>
        
        <div class="font-selector-container">
            <div class="form-group">
                <label for="font-select">Tipo de letra:</label>
                <select id="font-select">
                    <option value="Arial, sans-serif">Arial (por defecto)</option>
                </select>
            </div>
            
            <div class="style-options">
                <div class="checkbox-group">
                    <input type="checkbox" id="bold-check">
                    <label for="bold-check">Negrita</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="italic-check">
                    <label for="italic-check">Itálica</label>
                </div>
            </div>
            
            <div class="slider-group">
                <label>
                    <span>Tamaño de fuente:</span>
                    <span class="size-value"><span id="size-display">20</span>px</span>
                </label>
                <input type="range" id="font-size" min="12" max="72" value="20" step="1">
            </div>
            
            <div class="color-group">
                <label for="text-color">Color del texto:</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="text-color" value="#000000">
                    <span class="color-value" id="color-display">#000000</span>
                </div>
            </div>
            
            <div class="form-group">
                <label for="text-input">Tu texto:</label>
                <textarea id="text-input" placeholder="Escribí tu texto acá..."></textarea>
            </div>
            
            <div class="form-group">
                <div class="preview-label">Vista previa:</div>
                <div id="preview-text">Tu texto aparecerá acá con la fuente seleccionada</div>
            </div>
            
            <div class="action-buttons">
                <button class="btn btn-primary" id="copy-btn">Copiar texto</button>
                <button class="btn btn-secondary" id="reset-btn">Resetear</button>
            </div>
            
            <div class="success-message" id="success-msg">¡Texto copiado al portapapeles!</div>
        </div>
    </div>
    
    <script>
        const fontSelect = document.getElementById('font-select');
        const textInput = document.getElementById('text-input');
        const previewText = document.getElementById('preview-text');
        const boldCheck = document.getElementById('bold-check');
        const italicCheck = document.getElementById('italic-check');
        const fontSizeSlider = document.getElementById('font-size');
        const sizeDisplay = document.getElementById('size-display');
        const textColorPicker = document.getElementById('text-color');
        const colorDisplay = document.getElementById('color-display');
        const copyBtn = document.getElementById('copy-btn');
        const resetBtn = document.getElementById('reset-btn');
        const successMsg = document.getElementById('success-msg');
        
        function updatePreview() {
            const selectedFont = fontSelect.value;
            const text = textInput.value || 'Tu texto aparecerá acá con la fuente seleccionada';
            const isBold = boldCheck.checked;
            const isItalic = italicCheck.checked;
            const fontSize = fontSizeSlider.value;
            const textColor = textColorPicker.value;
            
            previewText.style.fontFamily = selectedFont;
            previewText.style.fontWeight = isBold ? 'bold' : 'normal';
            previewText.style.fontStyle = isItalic ? 'italic' : 'normal';
            previewText.style.fontSize = fontSize + 'px';
            previewText.style.color = textColor;
            previewText.textContent = text;
            
            sizeDisplay.textContent = fontSize;
            colorDisplay.textContent = textColor.toUpperCase();
        }
        
        function copyToClipboard() {
            const text = textInput.value || 'Tu texto aparecerá acá con la fuente seleccionada';
            navigator.clipboard.writeText(text).then(() => {
                successMsg.classList.add('show');
                setTimeout(() => {
                    successMsg.classList.remove('show');
                }, 2000);
            }).catch(err => {
                alert('Error al copiar: ' + err);
            });
        }
        
        function resetAll() {
            fontSelect.value = 'Arial, sans-serif';
            textInput.value = '';
            boldCheck.checked = false;
            italicCheck.checked = false;
            fontSizeSlider.value = 20;
            textColorPicker.value = '#000000';
            updatePreview();
        }
        
        async function loadFonts() {
            try {
                const response = await fetch('/fonts/list');
                const fonts = await response.json();
                
                for (const font of fonts) {
                    try {
                        const style = document.createElement('style');
                        style.textContent = `
                            @font-face {
                                font-family: '${font.name}';
                                src: url('${font.path}');
                            }
                        `;
                        document.head.appendChild(style);
                        
                        const option = document.createElement('option');
                        option.value = font.name;
                        option.textContent = font.name;
                        option.style.fontFamily = font.name;
                        fontSelect.appendChild(option);
                    } catch (err) {
                        console.error('Error cargando fuente:', font.name, err);
                    }
                }
            } catch (err) {
                console.error('Error obteniendo lista de fuentes:', err);
            }
        }
        
        fontSelect.addEventListener('change', updatePreview);
        textInput.addEventListener('input', updatePreview);
        boldCheck.addEventListener('change', updatePreview);
        italicCheck.addEventListener('change', updatePreview);
        fontSizeSlider.addEventListener('input', updatePreview);
        textColorPicker.addEventListener('input', updatePreview);
        copyBtn.addEventListener('click', copyToClipboard);
        resetBtn.addEventListener('click', resetAll);
        
        loadFonts();
        updatePreview();
    </script>
</body>
</html>
