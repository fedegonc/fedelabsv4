<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Gestión de Imágenes')"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    
    <div class="container">
        <h1>Gestión de Imágenes</h1>
        <p>Subí y administrá tus imágenes</p>
        
        <div class="success-message" id="success-msg"></div>
        <div class="error-message" id="error-msg"></div>
        
        <div class="upload-section">
            <h2>Subir nueva imagen</h2>
            <div class="upload-form">
                <div class="form-group">
                    <label for="image-upload">Archivo de imagen (.jpg, .png, .gif, .webp, .svg):</label>
                    <input type="file" id="image-upload" accept=".jpg,.jpeg,.png,.gif,.webp,.svg">
                </div>
                <button class="btn btn-primary" id="upload-btn">Subir imagen</button>
            </div>
        </div>
        
        <div class="fonts-list">
            <h2>Imágenes disponibles</h2>
            <div id="images-container">
                <div class="no-fonts">Cargando imágenes...</div>
            </div>
        </div>
    </div>
    
    <script>
        const imageUpload = document.getElementById('image-upload');
        const uploadBtn = document.getElementById('upload-btn');
        const imagesContainer = document.getElementById('images-container');
        const successMsg = document.getElementById('success-msg');
        const errorMsg = document.getElementById('error-msg');
        
        function showMessage(type, message) {
            const msgElement = type === 'success' ? successMsg : errorMsg;
            msgElement.textContent = message;
            msgElement.classList.add('show');
            setTimeout(() => {
                msgElement.classList.remove('show');
            }, 3000);
        }
        
        async function loadImages() {
            try {
                const response = await fetch('/images/list');
                const images = await response.json();
                
                if (images.length === 0) {
                    imagesContainer.innerHTML = '<div class="no-fonts">No hay imágenes subidas aún</div>';
                    return;
                }
                
                imagesContainer.innerHTML = '';
                
                for (const image of images) {
                    const imageItem = document.createElement('div');
                    imageItem.className = 'font-item';
                    imageItem.style.flexDirection = 'column';
                    imageItem.style.alignItems = 'flex-start';
                    imageItem.innerHTML = `
                        <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                            <div class="font-info">
                                <div class="font-name">${image.fileName}</div>
                                <div class="font-file">${image.size}</div>
                            </div>
                            <button class="btn btn-danger" onclick="deleteImage('${image.fileName}')">
                                Eliminar
                            </button>
                        </div>
                        <img src="${image.path}" alt="${image.fileName}" style="max-width: 100%; max-height: 300px; border-radius: 0.375rem; object-fit: contain;">
                        <div style="margin-top: 0.5rem; font-size: 0.875rem; color: #64748b; font-family: monospace; word-break: break-all;">
                            ${window.location.origin}${image.path}
                        </div>
                    `;
                    imagesContainer.appendChild(imageItem);
                }
            } catch (err) {
                console.error('Error cargando imágenes:', err);
                imagesContainer.innerHTML = '<div class="no-fonts">Error al cargar imágenes</div>';
            }
        }
        
        async function uploadImage() {
            const file = imageUpload.files[0];
            if (!file) {
                showMessage('error', 'Seleccioná un archivo primero');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                uploadBtn.disabled = true;
                uploadBtn.textContent = 'Subiendo...';
                
                const response = await fetch('/images/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('success', 'Imagen subida exitosamente: ' + result.fileName);
                    imageUpload.value = '';
                    await loadImages();
                } else {
                    showMessage('error', result.message);
                }
            } catch (err) {
                showMessage('error', 'Error al subir imagen: ' + err);
                console.error(err);
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Subir imagen';
            }
        }
        
        async function deleteImage(fileName) {
            if (!confirm('¿Estás seguro de eliminar esta imagen?')) {
                return;
            }
            
            try {
                const response = await fetch('/images/delete/' + fileName, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('success', 'Imagen eliminada exitosamente');
                    await loadImages();
                } else {
                    showMessage('error', result.message);
                }
            } catch (err) {
                showMessage('error', 'Error al eliminar imagen: ' + err);
                console.error(err);
            }
        }
        
        uploadBtn.addEventListener('click', uploadImage);
        loadImages();
    </script>
</body>
</html>
