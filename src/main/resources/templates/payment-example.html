<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de Pago - Stripe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #1a1a1a;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .product-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 2px solid #e9ecef;
        }

        .product-name {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
        }

        .product-description {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn.loading .btn-text {
            display: none;
        }

        .btn.loading .btn-spinner {
            display: block;
        }

        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 2px solid #bee5eb;
        }

        .alert-icon {
            font-size: 20px;
            margin-right: 10px;
        }

        .alert-content {
            display: flex;
            align-items: center;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .back-link:hover {
            color: #764ba2;
            transform: translateX(-5px);
        }

        .payment-methods {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
            justify-content: center;
            opacity: 0.6;
        }

        .payment-methods img {
            height: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💳 Ejemplo de Pago</h1>
        <p class="subtitle">Prueba la integración con Stripe</p>

        <div id="successAlert" class="alert alert-success">
            <div class="alert-content">
                <span class="alert-icon">✅</span>
                <span id="successMessage"></span>
            </div>
        </div>

        <div id="errorAlert" class="alert alert-error">
            <div class="alert-content">
                <span class="alert-icon">❌</span>
                <span id="errorMessage"></span>
            </div>
        </div>

        <div id="infoAlert" class="alert alert-info">
            <div class="alert-content">
                <span class="alert-icon">ℹ️</span>
                <span id="infoMessage"></span>
            </div>
        </div>

        <div class="product-card">
            <div class="product-name">Producto de Ejemplo</div>
            <div class="product-price" id="displayPrice">$50.00</div>
            <div class="product-description">Este es un producto de prueba para demostrar la integración con Stripe</div>
        </div>

        <form id="paymentForm">
            <div class="form-group">
                <label for="amount">Monto (en centavos)</label>
                <input type="number" id="amount" name="amount" value="5000" min="100" required>
                <small style="color: #666; font-size: 12px;">Ejemplo: 5000 = $50.00</small>
            </div>

            <div class="form-group">
                <label for="currency">Moneda</label>
                <select id="currency" name="currency" required>
                    <option value="usd">USD - Dólar Estadounidense</option>
                    <option value="eur">EUR - Euro</option>
                    <option value="ars">ARS - Peso Argentino</option>
                </select>
            </div>

            <div class="form-group">
                <label for="productName">Nombre del Producto</label>
                <input type="text" id="productName" name="productName" value="Producto de Ejemplo" required>
            </div>

            <button type="submit" class="btn" id="payButton">
                <span class="btn-text">Proceder al Pago</span>
                <div class="btn-spinner"></div>
            </button>
        </form>

        <div class="payment-methods">
            <span style="font-size: 12px; color: #666;">Powered by Stripe</span>
        </div>

        <a href="/" class="back-link">← Volver al inicio</a>
    </div>

    <script>
        const form = document.getElementById('paymentForm');
        const payButton = document.getElementById('payButton');
        const amountInput = document.getElementById('amount');
        const displayPrice = document.getElementById('displayPrice');
        const currencySelect = document.getElementById('currency');

        const successAlert = document.getElementById('successAlert');
        const errorAlert = document.getElementById('errorAlert');
        const infoAlert = document.getElementById('infoAlert');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const infoMessage = document.getElementById('infoMessage');

        function showAlert(type, message) {
            hideAllAlerts();
            
            if (type === 'success') {
                successMessage.textContent = message;
                successAlert.classList.add('show');
            } else if (type === 'error') {
                errorMessage.textContent = message;
                errorAlert.classList.add('show');
            } else if (type === 'info') {
                infoMessage.textContent = message;
                infoAlert.classList.add('show');
            }

            setTimeout(() => {
                hideAllAlerts();
            }, 10000);
        }

        function hideAllAlerts() {
            successAlert.classList.remove('show');
            errorAlert.classList.remove('show');
            infoAlert.classList.remove('show');
        }

        function updateDisplayPrice() {
            const amount = parseInt(amountInput.value) || 0;
            const currency = currencySelect.value.toUpperCase();
            const price = (amount / 100).toFixed(2);
            
            const symbols = {
                'USD': '$',
                'EUR': '€',
                'ARS': '$'
            };
            
            displayPrice.textContent = `${symbols[currency] || '$'}${price}`;
        }

        amountInput.addEventListener('input', updateDisplayPrice);
        currencySelect.addEventListener('change', updateDisplayPrice);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            hideAllAlerts();
            payButton.disabled = true;
            payButton.classList.add('loading');

            const formData = {
                amount: parseInt(amountInput.value),
                currency: currencySelect.value,
                productName: document.getElementById('productName').value,
                successUrl: window.location.origin + '/payment-success',
                cancelUrl: window.location.origin + '/payment-cancel'
            };

            try {
                showAlert('info', 'Creando sesión de pago...');

                const response = await fetch('/api/payment/create-checkout-session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Error al crear la sesión de pago');
                }

                showAlert('success', '¡Sesión creada! Redirigiendo a Stripe...');
                
                setTimeout(() => {
                    window.location.href = data.url;
                }, 1000);

            } catch (error) {
                console.error('Error:', error);
                showAlert('error', `Error: ${error.message}`);
                payButton.disabled = false;
                payButton.classList.remove('loading');
            }
        });

        updateDisplayPrice();
    </script>
</body>
</html>
