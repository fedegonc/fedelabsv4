<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Gestión de Fuentes')"></head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    
    <div class="container">
        <h1>Gestión de Fuentes</h1>
        <p>Subí y administrá tus fuentes personalizadas</p>
        
        <div class="success-message" id="success-msg"></div>
        <div class="error-message" id="error-msg"></div>
        
        <div class="upload-section">
            <h2>Subir nueva fuente</h2>
            <div class="upload-form">
                <div class="form-group">
                    <label for="font-upload">Archivo de fuente (.ttf, .otf, .woff, .woff2):</label>
                    <input type="file" id="font-upload" accept=".ttf,.otf,.woff,.woff2">
                </div>
                <button class="btn btn-primary" id="upload-btn">Subir fuente</button>
            </div>
        </div>
        
        <div class="fonts-list">
            <h2>Fuentes disponibles</h2>
            <div id="fonts-container">
                <div class="no-fonts">Cargando fuentes...</div>
            </div>
        </div>
    </div>
    
    <script>
        const fontUpload = document.getElementById('font-upload');
        const uploadBtn = document.getElementById('upload-btn');
        const fontsContainer = document.getElementById('fonts-container');
        const successMsg = document.getElementById('success-msg');
        const errorMsg = document.getElementById('error-msg');
        
        function showMessage(type, message) {
            const msgElement = type === 'success' ? successMsg : errorMsg;
            msgElement.textContent = message;
            msgElement.classList.add('show');
            setTimeout(() => {
                msgElement.classList.remove('show');
            }, 3000);
        }
        
        async function loadFonts() {
            try {
                const response = await fetch('/fonts/list');
                const fonts = await response.json();
                
                if (fonts.length === 0) {
                    fontsContainer.innerHTML = '<div class="no-fonts">No hay fuentes subidas aún</div>';
                    return;
                }
                
                fontsContainer.innerHTML = '';
                
                for (const font of fonts) {
                    const style = document.createElement('style');
                    style.textContent = `
                        @font-face {
                            font-family: '${font.name}';
                            src: url('${font.path}');
                        }
                    `;
                    document.head.appendChild(style);
                    
                    const fontItem = document.createElement('div');
                    fontItem.className = 'font-item';
                    fontItem.innerHTML = `
                        <div class="font-info">
                            <div class="font-name">${font.name}</div>
                            <div class="font-file">${font.fileName}</div>
                        </div>
                        <div class="font-preview" style="font-family: '${font.name}'">
                            Ejemplo de texto
                        </div>
                        <button class="btn btn-danger" onclick="deleteFont('${font.fileName}')">
                            Eliminar
                        </button>
                    `;
                    fontsContainer.appendChild(fontItem);
                }
            } catch (err) {
                console.error('Error cargando fuentes:', err);
                fontsContainer.innerHTML = '<div class="no-fonts">Error al cargar fuentes</div>';
            }
        }
        
        async function uploadFont() {
            const file = fontUpload.files[0];
            if (!file) {
                showMessage('error', 'Seleccioná un archivo primero');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                uploadBtn.disabled = true;
                uploadBtn.textContent = 'Subiendo...';
                
                const response = await fetch('/fonts/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('success', 'Fuente subida exitosamente: ' + result.fileName);
                    fontUpload.value = '';
                    await loadFonts();
                } else {
                    showMessage('error', result.message);
                }
            } catch (err) {
                showMessage('error', 'Error al subir fuente: ' + err);
                console.error(err);
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Subir fuente';
            }
        }
        
        async function deleteFont(fileName) {
            if (!confirm('¿Estás seguro de eliminar esta fuente?')) {
                return;
            }
            
            try {
                const response = await fetch('/fonts/delete/' + fileName, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('success', 'Fuente eliminada exitosamente');
                    await loadFonts();
                } else {
                    showMessage('error', result.message);
                }
            } catch (err) {
                showMessage('error', 'Error al eliminar fuente: ' + err);
                console.error(err);
            }
        }
        
        uploadBtn.addEventListener('click', uploadFont);
        loadFonts();
    </script>
</body>
</html>
