<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modoEdicion} ? 'Editar Apunte' : 'Nuevo Apunte'">Apunte</title>
    <link rel="stylesheet" th:href="@{/styles/header.css}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: clamp(32px, 5vw, 60px) clamp(20px, 4vw, 40px);
        }

        h1 {
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: clamp(28px, 4vw, 40px);
        }

        .back {
            display: inline-block;
            margin-bottom: 24px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .back:hover { color: #1a1a1a; }

        .form-group { margin-bottom: 24px; }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            font-size: 16px;
            font-family: inherit;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #1a1a1a;
        }

        textarea {
            min-height: 280px;
            resize: vertical;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
            flex-wrap: wrap;
        }

        button, .cancel {
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            display: inline-block;
            font-family: inherit;
        }

        button[type="submit"] {
            background: #1a1a1a;
            color: white;
            flex: 1;
            min-width: 160px;
        }

        button[type="submit"]:hover { background: #333; }

        .cancel {
            background: white;
            color: #1a1a1a;
            border: 2px solid #1a1a1a;
        }

        .cancel:hover { background: #f5f5f5; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">Federico Goncalvez</div>
        </div>
    </nav>

    <div class="container">
        <a href="/admin/apuntes" class="back">← Volver al admin</a>
        <h1 th:text="${modoEdicion} ? 'Editar Apunte' : 'Nuevo Apunte'">Apunte</h1>

        <form th:action="${modoEdicion} ? @{'/admin/apuntes/editar/' + ${apunte.id}} : @{/admin/apuntes}"
              th:object="${apunte}" method="post">
            <div class="form-group">
                <label for="titulo">Título</label>
                <input type="text" id="titulo" th:field="*{titulo}" required>
            </div>

            <div class="form-group">
                <label for="categoria">Etiqueta</label>
                <select id="categoria" th:field="*{categoria}" required>
                    <option value="">Selecciona...</option>
                    <option value="General">General</option>
                    <option value="Tecnología">Tecnología</option>
                    <option value="Programación">Programación</option>
                    <option value="Diseño">Diseño</option>
                    <option value="Negocios">Negocios</option>
                    <option value="Personal">Personal</option>
                </select>
            </div>

            <div class="form-group">
                <label for="imageUrl">URL de imagen</label>
                <input type="text" id="imageUrl" th:field="*{imageUrl}" placeholder="https://...">
            </div>

            <div class="form-group">
                <label for="contenido">Contenido</label>
                <textarea id="contenido" th:field="*{contenido}" required></textarea>
            </div>

            <div class="actions">
                <button type="submit" th:text="${modoEdicion} ? 'Guardar cambios' : 'Crear'">Guardar</button>
                <a href="/admin/apuntes" class="cancel">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
