<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${apunte.titulo}">Detalle Apunte</title>
    <link rel="stylesheet" th:href="@{/styles/header.css}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            line-height: 1.6;
        }

        .article {
            max-width: 800px;
            margin: 0 auto;
            padding: clamp(32px, 5vw, 60px) clamp(20px, 4vw, 40px) clamp(60px, 8vw, 100px);
        }

        .back {
            display: inline-block;
            margin-bottom: 30px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .back:hover { color: #1a1a1a; }

        .tag {
            display: inline-block;
            background: #1a1a1a;
            color: white;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: clamp(34px, 6vw, 56px);
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .meta {
            color: #999;
            font-size: 14px;
            margin-bottom: clamp(28px, 4vw, 40px);
        }

        .hero-img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: clamp(28px, 4vw, 50px);
        }

        .content {
            font-size: clamp(16px, 1.5vw, 19px);
            color: #333;
            white-space: pre-wrap;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">Federico Goncalvez</div>
        </div>
    </nav>

    <article class="article">
        <a href="/" class="back">← Volver</a>
        <span class="tag" th:text="${apunte.categoria}">Etiqueta</span>
        <h1 th:text="${apunte.titulo}">Título</h1>
        <p class="meta" th:text="${#temporals.format(apunte.fechaCreacion, 'dd MMMM yyyy')}">Fecha</p>

        <img th:if="${apunte.imageUrl}" class="hero-img" th:src="${apunte.imageUrl}" th:alt="${apunte.titulo}">

        <div class="content" th:text="${apunte.contenido}">Contenido</div>
    </article>
</body>
</html>
