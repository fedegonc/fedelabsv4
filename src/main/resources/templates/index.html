<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Federico Goncalvez</title>

    <link rel="stylesheet" th:href="@{/styles/header.css}">
    <link rel="stylesheet" th:href="@{/styles/styles.css}">
</head>

<body>

    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">Federico Goncalvez</div>
        </div>
    </nav>

    <div class="container">

        <h1 class="page-title">Apuntes.</h1>

        <p class="page-subtitle">
            Notas, ideas sueltas y lo que voy aprendiendo en el camino.
        </p>

        <div class="grid">

            <a th:each="apunte : ${apuntes}"
               class="card"
               th:href="@{'/apuntes/' + ${apunte.id}}">

                <img class="card-img"
                     th:src="${apunte.imageUrl}"
                     th:alt="${apunte.titulo}">

                <div class="card-overlay"></div>

                <span class="card-tag"
                      th:text="${apunte.categoria}">
                    Etiqueta
                </span>

                <h2 class="card-title"
                    th:text="${apunte.titulo}">
                    Título
                </h2>

            </a>

        </div>

    </div>

</body>
</html>
